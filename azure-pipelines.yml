# =====================================================================================================
# FOCUSED #1322 REPRODUCTION PIPELINE - issue/1322-repro branch ONLY. DO NOT MERGE TO master.
#
# This intentionally REPLACES the normal multi-stage build/test pipeline with a lean one that does
# exactly one thing: run Lucene.Net.Index.TestIndexWriterCommit.TestCommitThreadSafety heavily, in a
# repeat loop, across all target frameworks and the architectures where #1322 has been observed
# (Linux x64, Windows x64, Windows x86), to try to reproduce the intermittent .NET 10 failure under load.
#
# It builds ONLY the _I-J test shard (which contains TestIndexWriterCommit) and runs ONLY that one test,
# to keep iterations fast so we can do many of them per agent-minute. Diagnostics are enabled via
# LUCENENET_1322_TRACE=1 (added on this branch in SegmentInfos.FindSegmentsFile.Run) so that when the
# test fails, the captured console output shows the EXACT retry sequence at the moment of failure.
# =====================================================================================================

trigger: none   # manual runs only
pr: none

variables:
- name: DotNetSDKVersion
  value: '10.0.100'
- name: DotNetSDK9Version
  value: '9.0.100'
- name: DotNetSDK8Version
  value: '8.0.100'
- name: TestProject
  value: 'src/Lucene.Net.Tests._I-J/Lucene.Net.Tests._I-J.csproj'
- name: TestFilter
  value: 'FullyQualifiedName~Lucene.Net.Index.TestIndexWriterCommit.TestCommitThreadSafety'
# Number of times to run the test per job. Override at queue time.
- name: RepeatCount
  value: '200'
# Stop a job early once this many iterations have failed (we have enough signal by then).
- name: MaxFailures
  value: '3'

stages:
- stage: Repro_Stage
  displayName: 'Repro #1322:'
  jobs:

  # ---------------------------------------------------------------------------------------------------
  # Linux x64, net10.0 ONLY. Confirmed: net8.0/net9.0 are clean, and the failure occurs on both Linux
  # and Windows (NOT OS-related), so we focus all compute on the single fastest reproducing target.
  # (Re-add Windows / other frameworks from git history if a comparison is ever needed again.)
  # ---------------------------------------------------------------------------------------------------
  - job: Linux_x64_net10
    displayName: 'Linux x64 net10.0'
    pool:
      vmImage: 'ubuntu-latest'
    timeoutInMinutes: 120
    steps:
    - template: '.build/azure-templates/repro-1322-steps.yml'
      parameters:
        osName: 'Linux'
        framework: 'net10.0'
        platform: 'x64'

  # NOTE: Windows x86 (another observed failing arch) is intentionally NOT in this first pass. Running
  # the test host as x86 on .NET 8+ requires a separate x86 SDK install + multi-level lookup (see the
  # x86 hack in run-tests-on-os.yml). If x64/Linux do not reproduce, add an x86 job that first installs
  # the x86 SDK and passes RunConfiguration.TargetPlatform=x86.

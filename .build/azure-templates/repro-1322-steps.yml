# Steps for the focused #1322 repro: build only the _I-J shard for one framework, then run
# TestCommitThreadSafety in a repeat loop with diagnostics, capturing every iteration's output.
# (issue/1322-repro branch only - DO NOT MERGE)

parameters:
  osName: ''      # e.g. Linux, Windows - keeps artifact/result names unique across jobs
  framework: ''   # e.g. net10.0, net9.0, net8.0, net48, net472
  platform: 'x64' # x64 or x86

steps:
# Install the .NET SDKs needed. net10 SDK can build/run all the .NET (Core) TFMs; .NET Framework
# (net48/net472) needs the Windows-only reference assemblies (present on windows-latest images).
- task: UseDotNet@2
  displayName: 'Use .NET SDK 8'
  inputs:
    packageType: 'sdk'
    version: '$(DotNetSDK8Version)'

- task: UseDotNet@2
  displayName: 'Use .NET SDK 9'
  inputs:
    packageType: 'sdk'
    version: '$(DotNetSDK9Version)'

- task: UseDotNet@2
  displayName: 'Use .NET SDK 10'
  inputs:
    packageType: 'sdk'
    version: '$(DotNetSDKVersion)'

- pwsh: |
    dotnet --info
    Write-Host "Framework under test: ${{ parameters.framework }}  platform: ${{ parameters.platform }}"
    Write-Host "Logical processor count: $([System.Environment]::ProcessorCount)"
  displayName: 'Environment info'

# Write lucene.testsettings.json next to the repo root so the test framework picks it up.
# slow=true and directory=random match the CI configuration under which #1322 was captured.
- pwsh: |
    $fileText = @"
    {
      "assert": "true",
      "tests": {
        "nightly": "false",
        "weekly": "false",
        "slow": "true",
        "awaitsfix": "false",
        "codec": "random",
        "docvaluesformat": "random",
        "postingsformat": "random",
        "directory": "random",
        "verbose": "false",
        "multiplier": "1",
        "failontestfixtureonetimesetuperror": "true"
      }
    }
    "@
    $path = Join-Path "$(System.DefaultWorkingDirectory)" "lucene.testsettings.json"
    Out-File -FilePath $path -Encoding UTF8 -InputObject $fileText
    Write-Host "Wrote $path"
    Get-Content $path
  displayName: 'Write lucene.testsettings.json'

- pwsh: |
    dotnet build "$(TestProject)" --framework "${{ parameters.framework }}" -c Release -p:TestFrameworks=true
  displayName: 'Build _I-J shard (${{ parameters.framework }})'

# Repeat loop: run ONLY TestCommitThreadSafety, RepeatCount times. The whole campaign completes (we
# count failures across all iterations); the step then FAILS at the end if any iteration failed, so a
# reproduction turns the run red. The publish steps below use succeededOrFailed() so results + logs are
# still uploaded even when this step fails. Each iteration writes its own TRX. Tracing is on so a
# failing iteration's console output shows the exact retry sequence in FindSegmentsFile.Run.
- pwsh: |
    $ErrorActionPreference = 'Continue'
    $env:LUCENENET_1322_TRACE = '1'
    $repeat = [int]'$(RepeatCount)'
    $maxFailures = [int]'$(MaxFailures)'
    $resultsDir = Join-Path "$(Build.ArtifactStagingDirectory)" "results-${{ parameters.osName }}-${{ parameters.framework }}-${{ parameters.platform }}"
    New-Item -ItemType Directory -Path $resultsDir -Force | Out-Null
    $failures = 0
    $ran = 0
    for ($i = 1; $i -le $repeat; $i++) {
        $ran = $i
        $trx = "iter_$i.trx"
        $log = Join-Path $resultsDir "iter_$i.log"
        dotnet test "$(TestProject)" `
            --framework "${{ parameters.framework }}" `
            -c Release --no-build `
            --filter "$(TestFilter)" `
            --blame --blame-hang --blame-hang-dump-type mini --blame-hang-timeout 10minutes `
            --logger "console;verbosity=normal" `
            --logger "trx;LogFileName=$trx" `
            --results-directory $resultsDir 2>&1 | Tee-Object -FilePath $log
        $rc = $LASTEXITCODE
        if ($rc -ne 0) {
            $failures++
            Write-Host "##[warning]Iteration $i FAILED (exit=$rc) on ${{ parameters.osName }}/${{ parameters.framework }}/${{ parameters.platform }} ($failures/$maxFailures)"
            # Echo any #1322 trace lines from this iteration to the job log for quick scanning.
            Select-String -Path $log -Pattern '\[1322 ' | ForEach-Object { Write-Host "##[error]$($_.Line)" }
            # Stop early once we have enough signal - no need to burn the rest of the budget.
            if ($failures -ge $maxFailures) {
                Write-Host "##[warning]Reached MaxFailures=$maxFailures after $i iterations; stopping early."
                break
            }
        } else {
            # Keep logs small: only retain logs for failing iterations.
            Remove-Item $log -ErrorAction SilentlyContinue
        }
    }
    Write-Host "=============================================================="
    Write-Host "SUMMARY ${{ parameters.osName }}/${{ parameters.framework }}/${{ parameters.platform }}: $failures FAILED in $ran iterations (stopped early at MaxFailures=$maxFailures)"
    Write-Host "=============================================================="
    if ($failures -gt 0) {
        Write-Host "##vso[task.logissue type=error;]#1322 reproduced: $failures failed in $ran iterations on ${{ parameters.osName }}/${{ parameters.framework }}/${{ parameters.platform }}"
        # Fail the run so a reproduction is unmissable. Publish steps below still run (succeededOrFailed).
        exit 1
    }
  displayName: 'Run TestCommitThreadSafety x$(RepeatCount) (${{ parameters.osName }}/${{ parameters.framework }}/${{ parameters.platform }})'

# Publish all TRX results so the failure rate is visible in the ADO test tab.
- task: PublishTestResults@2
  displayName: 'Publish Test Results (${{ parameters.osName }}/${{ parameters.framework }}/${{ parameters.platform }})'
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'VSTest'
    testResultsFiles: '$(Build.ArtifactStagingDirectory)/results-${{ parameters.osName }}-${{ parameters.framework }}-${{ parameters.platform }}/**/*.trx'
    testRunTitle: '#1322 ${{ parameters.osName }} ${{ parameters.framework }} ${{ parameters.platform }}'
    mergeTestResults: true
    failTaskOnFailedTests: false

# Publish the captured logs (failing iterations only) + any hang dumps as an artifact for analysis.
- task: PublishPipelineArtifact@1
  displayName: 'Publish repro logs (${{ parameters.osName }}/${{ parameters.framework }}/${{ parameters.platform }})'
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/results-${{ parameters.osName }}-${{ parameters.framework }}-${{ parameters.platform }}'
    artifactName: 'repro-${{ parameters.osName }}-${{ parameters.framework }}-${{ parameters.platform }}'
